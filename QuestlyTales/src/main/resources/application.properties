anthropic.model=${ANTHROPIC_MODEL:claude-opus-4-8}
# Nombre de passes de relecture/critique de la topologie après le premier jet
anthropic.structure.refinement-passes=${ANTHROPIC_REFINEMENT_PASSES:2}
