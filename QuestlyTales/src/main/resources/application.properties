jwt.expiration=86400000

# DeepSeek API
deepseek.api.key=${DEEPSEEK_API_KEY}
deepseek.api.url=https://api.deepseek.com/chat/completions

# Génération d'histoires : moteur actif ("deepseek" ou "claude")
