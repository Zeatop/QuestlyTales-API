spring.application.name=QuestlyTales

# Charge application-local.properties s'il existe (secrets locaux non versionnés).
# `optional:` => ne casse rien en CI / si le fichier est absent. Les valeurs de
# ce fichier surchargent celles ci-dessous, sans avoir à activer de profil.
spring.config.import=optional:classpath:application-local.properties

# Configuration MongoDB
spring.data.mongodb.uri=${MONGO_URI_QUESTLYTALES:mongodb://root:root@localhost:27017/questlytales?authSource=admin}
spring.data.mongodb.uri.users=${MONGO_URI_USERS_QUESTLYTALES:mongodb://root:root@localhost:27017/questlytales?authSource=admin}
